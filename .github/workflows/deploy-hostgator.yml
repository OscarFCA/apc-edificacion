name: Deploy a HostGator (FTP)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Desplegar por FTP a HostGator
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT }}
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          protocol: ftp
          # Solo se sube el sitio; se excluyen archivos de desarrollo
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            build-site.mjs
            README.md
            BRANDBOOK.md
